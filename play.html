<style>
/* ══════════════════════════════
   구글 시트 연동 설정
   1) 구글 시트를 아래 컬럼 구조로 만드세요:
      A: id | B: category | C: emoji | D: title | E: summary | F: content | G: tags | H: date

   2) Apps Script 웹앱으로 배포:
      시트 → 확장 프로그램 → Apps Script → 아래 코드 붙여넣기 → 배포 → 웹앱 URL 복사
      ─────────────────────────────────────
      function doGet(e) {
        const sheet = SpreadsheetApp.getActiveSpreadsheet().getActiveSheet();
        const rows = sheet.getDataRange().getValues();
        const headers = rows[0];
        const tips = rows.slice(1).map(r => {
          const obj = {};
          headers.forEach((h, i) => obj[h] = r[i]);
          return obj;
        });
        return ContentService
          .createTextOutput(JSON.stringify({ tips }))
          .setMimeType(ContentService.MimeType.JSON);
      }
      ─────────────────────────────────────
      배포 설정: 액세스 권한 = "모든 사용자"

   3) 아래 SHEET_JSON_URL 에 복사한 URL을 붙여넣으세요.
══════════════════════════════ */
/* ── 포인트 컬러 (primary 재사용) ── */
:root { --play-accent: var(--primary); --play-accent-dark: var(--primary-dark); }

/* ── HERO ── */
.play-hero{background:var(--primary);color:#fff;padding:2rem 1.5rem 2.5rem;text-align:center;}
.play-hero .eyebrow{font-size:11px;font-weight:700;letter-spacing:.1em;opacity:.6;text-transform:uppercase;margin-bottom:.5rem;}
.play-hero h1{font-size:clamp(1.4rem,4vw,2rem);font-weight:900;line-height:1.2;margin-bottom:.4rem;}
.play-hero p{font-size:13px;opacity:.8;max-width:420px;margin:0 auto;}

/* ── LIST ── */
.play-main{max-width:760px;margin:0 auto;padding:1.5rem 1rem 5rem;}

.cat-filter{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;margin-bottom:1.25rem;scrollbar-width:none;}
.cat-filter::-webkit-scrollbar{display:none;}
.cf-btn{padding:7px 16px;border-radius:99px;border:1.5px solid var(--gray-200);background:var(--bg);font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;font-family:inherit;color:var(--text-muted);transition:.15s;flex-shrink:0;}
.cf-btn:hover{border-color:var(--primary);color:var(--primary);}
.cf-btn.active{background:var(--primary);border-color:var(--primary);color:#fff;}

.play-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;}

/* ── 카드 ── */
.play-card{background:var(--bg);border:1px solid var(--gray-100);border-radius:var(--radius);overflow:hidden;text-decoration:none;color:var(--text);transition:.18s;display:flex;flex-direction:column;box-shadow:0 1px 6px rgba(0,0,0,.04);cursor:pointer;}
.play-card:hover{border-color:var(--primary);box-shadow:0 4px 16px rgba(61,122,94,.12);transform:translateY(-2px);}
.play-thumb{height:88px;display:flex;align-items:center;justify-content:center;font-size:2.5rem;flex-shrink:0;}
.play-body{padding:.875rem 1rem 1rem;flex:1;display:flex;flex-direction:column;gap:4px;}
.play-cat{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;}
.play-name{font-size:13px;font-weight:700;color:var(--text);line-height:1.4;}
.play-summary{font-size:12px;color:var(--text-muted);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.play-age-badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:99px;background:var(--primary-light);color:var(--primary-dark);margin-top:4px;align-self:flex-start;}

/* ── 더보기 ── */
.load-more-btn{display:block;width:100%;padding:13px;margin-top:1.25rem;border:1.5px solid var(--gray-200);border-radius:var(--radius-sm);background:var(--bg);color:var(--text-muted);font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:.15s;}
.load-more-btn:hover{border-color:var(--primary);color:var(--primary);}

/* ── DETAIL ── */
.detail-wrap{max-width:680px;margin:0 auto;padding:1.5rem 1rem 5rem;}
.detail-back{display:inline-flex;align-items:center;gap:6px;font-size:13px;color:var(--text-muted);text-decoration:none;margin-bottom:1.25rem;font-weight:600;}
.detail-back:hover{color:var(--primary);}
.detail-cat-badge{display:inline-block;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;padding:3px 10px;border-radius:99px;margin-bottom:.75rem;}
.detail-thumb-big{height:160px;display:flex;align-items:center;justify-content:center;font-size:5rem;border-radius:var(--radius);margin-bottom:1.25rem;}
.detail-title{font-size:clamp(1.3rem,4vw,1.8rem);font-weight:900;color:var(--text);line-height:1.3;margin-bottom:.5rem;}
.detail-meta{font-size:12px;color:var(--text-muted);margin-bottom:1rem;display:flex;flex-wrap:wrap;align-items:center;gap:8px;}
.meta-chip{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:99px;background:var(--surface);font-size:12px;color:var(--text-muted);}
.detail-content{font-size:15px;color:var(--text);line-height:1.85;}
.detail-content h2{font-size:17px;font-weight:800;color:var(--text);margin:1.75rem 0 .6rem;padding-left:.75rem;border-left:3px solid var(--primary);}
.detail-content p{margin-bottom:1rem;}
.detail-content ul{padding-left:1.4rem;margin-bottom:1rem;}
.detail-content li{margin-bottom:.4rem;line-height:1.7;}
.detail-content blockquote{background:var(--primary-light);border-left:3px solid var(--primary);border-radius:0 var(--radius-sm) var(--radius-sm) 0;padding:.875rem 1.1rem;margin:1rem 0;font-size:14px;color:var(--primary-dark);}
.detail-content .tip-box{background:var(--amber-light);border:1px solid var(--amber-mid);border-radius:var(--radius-sm);padding:.875rem 1rem;margin:1rem 0;font-size:13px;color:#7a4d0a;}

/* ── 하트 + 예약 버튼 바 ── */
.action-bar{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--gray-100);padding:.875rem 1rem;display:flex;gap:10px;align-items:center;z-index:200;box-shadow:0 -4px 16px rgba(0,0,0,.08);}
.action-bar.hidden{display:none;}
.action-bar .container{display: flex;width: 100%;max-width: 650px;gap: 10px;padding: 0;margin: 0 auto;}
.heart-btn{width:50px;height:50px;border-radius:var(--radius-sm);border:1.5px solid var(--primary);background:#fff;display:flex;align-items:center;justify-content:center;font-size:1.4rem;cursor:pointer;transition:.15s;flex-shrink:0;}
.heart-btn:hover{background:var(--primary-light);}
.heart-btn.liked{background:var(--primary-light);border-color:var(--primary);}
.book-btn{flex:1;height:50px;background:var(--primary);color:#fff;border:none;border-radius:var(--radius-sm);font-size:15px;font-weight:800;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:8px;transition:.15s;text-decoration:none;}
.book-btn:hover{background:var(--primary-dark);}
.book-btn.disabled{background:var(--gray-200);color:var(--gray-500);cursor:default;}

/* detail 페이지 하단 여백 (fixed bar 가려지지 않게) */
.detail-spacer{height:80px;}

/* ── 관련 액티비티 ── */
.related-section{margin-top:2rem;}
.related-section h3{font-size:15px;font-weight:800;color:var(--text);margin-bottom:1rem;}
.related-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;}

/* ── STATES ── */
.loading-state{text-align:center;padding:3rem 1rem;color:var(--text-muted);}
.loading-state .spin{display:inline-block;font-size:2rem;animation:spin 1.2s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.empty-state{text-align:center;padding:2.5rem 1rem;color:var(--text-muted);font-size:14px;}

/* ── AD ── */
.ad-top{margin:0 0 1.25rem;min-height:60px;}
</style>
</head>

  <script>
  // ══════════════════════════════════════════
  // Sheet2 에서 액티비티 데이터를 가져와요.
  // config.js 의 PLAY_SHEET_URL 에 Apps Script URL 을 입력하세요.

  // SpreadsheetApp.getActiveSpreadsheet().getSheets()[1] 로 변경하세요.
  // ══════════════════════════════════════════
  const PLAY_JSON_URL = (typeof CONFIG !== 'undefined') ? CONFIG.PLAY_SHEET_URL : '';
  
  const CAT_COLORS = {
    '실내놀이':   {bg:'#f0f4ff', color:'#0a2d7a'},
    '실외놀이':   {bg:'#f0faf4', color:'#275040'},
    '미술/만들기':{bg:'#fff8ed', color:'#7a4d0a'},
    '음악/율동':  {bg:'#fef0f5', color:'#8a1a55'},
    '교육/놀이터':{bg:'#f5f0ff', color:'#3c1a8a'},
    '기타':       {bg:'#f8f8f6', color:'#3f3f3b'},
  };
  const CAT_EMOJI = {'실내놀이':'🏠','실외놀이':'🌳','미술/만들기':'🎨','음악/율동':'🎵','교육/놀이터':'📚','기타':'🎪'};
  
  let allItems = [];
  let filteredItems = [];
  let displayCount = 12;
  let currentCat = '전체';
  let currentItem = null;
  let likedIds = JSON.parse(localStorage.getItem('playLikes') || '[]');
  
  // ── 샘플 데이터 ──────────────────────────────
  function getSampleData() {
    return [
      {id:'p1',category:'실내놀이',emoji:'🧩',name:'레고 듀플로 블록 놀이',summary:'24개월부터 즐길 수 있는 대형 블록 창의 놀이',age:'24개월+',link:'https://www.lego.com/ko-kr',
       content:`<h2>레고 듀플로란?</h2><p>듀플로는 일반 레고보다 2배 큰 블록으로 작은 손으로도 쉽게 조립할 수 있어요. 삼킴 사고 위험이 낮아 24개월부터 안전하게 사용할 수 있어요.</p><h2>발달 효과</h2><ul><li>소근육 발달 및 손-눈 협응력 향상</li><li>색깔·모양·크기 인지 학습</li><li>창의적 구성 놀이로 상상력 자극</li><li>집중력 향상</li></ul><blockquote>블록 놀이는 수학적 사고의 기초를 만들어요. 함께 "더 높이 쌓아보자!"라고 말하며 언어 자극도 함께 해보세요.</blockquote><div class="tip-box">💡 <strong>꿀팁:</strong> 블록을 색깔별로 분류하는 놀이를 함께 하면 분류 개념도 자연스럽게 배울 수 있어요.</div>`},
      {id:'p2',category:'실외놀이',emoji:'🌳',name:'어린이대공원 나들이',summary:'서울 대표 무료 어린이 놀이 공간',age:'전 연령',link:'https://www.childrenpark.or.kr',
       content:`<h2>어린이대공원 소개</h2><p>서울 광진구에 위치한 어린이대공원은 동물원·놀이동산·식물원이 모두 무료로 운영되는 가족 나들이 명소예요.</p><h2>아이와 즐길 수 있는 것</h2><ul><li>동물원 — 사자·기린·코끼리 등 다양한 동물 관람</li><li>꿈의숲 놀이터 — 대형 복합 놀이 시설</li><li>식물원 — 사계절 꽃과 나무 탐색</li><li>공연장 — 주말 어린이 공연 무료 관람</li></ul><div class="tip-box">💡 주차는 혼잡하니 대중교통(7호선 어린이대공원역)을 이용하세요.</div>`},
      {id:'p3',category:'미술/만들기',emoji:'🎨',name:'핑거페인팅 체험',summary:'손으로 그리는 감각 미술 놀이, 18개월+',age:'18개월+',link:'',
       content:`<h2>핑거페인팅이란?</h2><p>붓 없이 손가락으로 직접 물감을 찍어 그리는 감각 미술이에요. 촉각 자극이 풍부해 영아 발달에 매우 좋아요.</p><h2>준비물</h2><ul><li>무독성 핑거페인트 (또는 식용색소 + 밀가루 반죽)</li><li>큰 도화지 또는 욕실 타일</li><li>물티슈·앞치마</li></ul><h2>놀이 방법</h2><ul><li>도화지를 바닥에 넓게 펼쳐요.</li><li>여러 색의 물감을 작은 접시에 담아요.</li><li>손가락·손바닥·발바닥으로 자유롭게 찍어요.</li><li>말리면 액자에 넣어 소중한 추억으로!</li></ul><blockquote>손바닥 도장으로 만든 나무, 발바닥 도장으로 만든 동물 — 아이만의 작품을 함께 만들어보세요.</blockquote>`},
      {id:'p4',category:'음악/율동',emoji:'🎵',name:'짐보리 음악 수업',summary:'영아 전용 음악·율동 프로그램',age:'6개월+',link:'https://www.gymboree.co.kr',
       content:`<h2>짐보리란?</h2><p>미국에서 시작된 영아 전용 놀이·음악 프로그램으로 국내에도 다수 센터가 운영되고 있어요. 음악·율동·감각 놀이를 통합한 수업이에요.</p><h2>대상 연령</h2><ul><li>Play & Music — 6개월~5세</li><li>짐나스틱 — 15개월~5세</li></ul><h2>기대 효과</h2><ul><li>청각 발달 및 리듬감 형성</li><li>또래와의 사회적 상호작용 경험</li><li>대근육·소근육 동시 발달</li></ul><div class="tip-box">💡 첫 수업은 무료 체험이 가능한 센터가 많아요. 가까운 지점에 문의해보세요.</div>`},
      {id:'p5',category:'교육/놀이터',emoji:'📚',name:'국립어린이과학관',summary:'서울 화랑로 위치, 36개월 미만 무료',age:'전 연령',link:'https://www.csc.go.kr',
       content:`<h2>국립어린이과학관 소개</h2><p>서울 화랑로에 위치한 국립어린이과학관은 체험형 과학 전시로 아이들에게 큰 인기예요. 36개월 미만은 무료 입장이에요.</p><h2>주요 전시</h2><ul><li>유아 전용 체험존 (36개월 미만)</li><li>로봇·코딩 체험 (5세 이상 권장)</li><li>우주·자연 탐험 전시</li><li>4D 영상관</li></ul><div class="tip-box">💡 주말은 매우 혼잡해요. 평일 오전 개관 시간(9:30)에 맞춰 방문하면 여유롭게 즐길 수 있어요.</div>`},
      {id:'p6',category:'실내놀이',emoji:'🏊',name:'아기 수영 (베이비 스윔)',summary:'생후 4개월부터 가능한 물 적응 프로그램',age:'4개월+',link:'',
       content:`<h2>베이비 수영이란?</h2><p>부모와 함께 물에 들어가 신체를 움직이는 영아 수영 프로그램이에요. 생후 4개월부터 참여할 수 있어요.</p><h2>효과</h2><ul><li>대근육 발달 (팔다리 움직임)</li><li>물에 대한 공포심 제거</li><li>수면 질 향상</li><li>부모-아기 유대감 강화</li></ul><h2>주의사항</h2><ul><li>수영장 수온은 32~34°C가 적당해요.</li><li>수영 전 1시간 이상 수유를 피하세요.</li><li>귀 염증(중이염) 있을 때는 쉬어요.</li></ul>`},
      {id:'p7',category:'미술/만들기',emoji:'🧸',name:'클레이 점토 놀이',summary:'소근육 발달에 좋은 점토 조형 놀이',age:'36개월+',link:'',
       content:`<h2>클레이 놀이의 효과</h2><p>점토를 주무르고 빚으며 소근육을 발달시키고 창의적 표현 능력을 키워요.</p><h2>추천 점토 종류</h2><ul><li><strong>밀가루 반죽:</strong> 가장 안전, 집에서 만들 수 있어요.</li><li><strong>자연 클레이:</strong> 굳으면 보존 가능, 색칠도 할 수 있어요.</li><li><strong>에어 클레이:</strong> 가볍고 색깔이 다양해요.</li></ul><div class="tip-box">💡 식용색소로 색깔 반죽을 만들어주면 더 흥미로워해요. 반죽에 라벤더 오일 한 방울 — 향기 놀이도 함께!</div>`},
      {id:'p8',category:'실외놀이',emoji:'🚲',name:'한강공원 자전거 타기',summary:'세발자전거·킥보드 입문, 가족 라이딩',age:'24개월+',link:'https://hangang.seoul.go.kr',
       content:`<h2>한강공원 자전거 코스</h2><p>한강변 자전거 도로는 자동차 없는 안전한 환경이라 아이와 함께 라이딩하기에 최적이에요.</p><h2>추천 코스</h2><ul><li>여의도한강공원 — 넓은 광장, 분수대</li><li>뚝섬한강공원 — 자전거 대여 가능, 수영장 병행</li><li>반포한강공원 — 달빛무지개분수 야경</li></ul><h2>준비물</h2><ul><li>헬멧 (필수!), 무릎·팔꿈치 보호대</li><li>물·간식, 자외선차단제</li><li>세발자전거 또는 킥보드</li></ul><blockquote>처음엔 페달 없이 두 발로 밀며 타는 "밸런스 바이크"로 시작하면 균형 감각을 자연스럽게 익힐 수 있어요.</blockquote>`},
    ];
  }
  
  // ── 초기화 ───────────────────────────────────
  async function init() {
    const params = new URLSearchParams(location.search);
    const itemId = params.get('id');
    await loadAllData();
    if (itemId) showDetail(itemId);
    else showList();
  }
  
  async function loadAllData() {
    if (allItems.length) return;
    if (!PLAY_JSON_URL) { allItems = getSampleData(); return; }
    try {
      const res = await fetch(PLAY_JSON_URL);
      const data = await res.json();
      allItems = Array.isArray(data) ? data : (data.activities || data.tips || []);
      if (!allItems.length) throw new Error();
    } catch { allItems = getSampleData(); }
  }
  
  // ── 목록 화면 ────────────────────────────────
  function showList(e) {
    if (e) e.preventDefault();
    history.pushState({}, '', 'play.html');
    document.getElementById('listView').classList.remove('hidden');
    document.getElementById('detailView').classList.add('hidden');
    document.getElementById('actionBar').classList.add('hidden');
    document.title = '아이 액티비티 추천 | 아기도구함';
    renderCatFilter();
    renderGrid(currentCat);
  }
  
  function renderCatFilter() {
    const cats = ['전체', ...new Set(allItems.map(t => t.category || '기타'))];
    document.getElementById('playCatFilter').innerHTML = cats.map((c, i) =>
      `<button class="cf-btn${(i===0&&currentCat==='전체')||(c===currentCat)?' active':''}" onclick="changeCat('${c}',this)">
        ${CAT_EMOJI[c]||'🎪'} ${c}
      </button>`
    ).join('');
  }
  
  function changeCat(cat, btn) {
    currentCat = cat; displayCount = 12;
    document.querySelectorAll('.cf-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderGrid(cat);
  }
  
  function renderGrid(cat) {
    filteredItems = cat === '전체' ? allItems : allItems.filter(t => t.category === cat);
    const slice = filteredItems.slice(0, displayCount);
    const grid = document.getElementById('listGrid');
    if (!slice.length) { grid.innerHTML = '<div class="empty-state">해당 카테고리의 액티비티가 없어요.</div>'; return; }
    grid.innerHTML = `<div class="play-grid">${slice.map(playCardHTML).join('')}</div>`;
    filteredItems.length > displayCount
      ? document.getElementById('loadMoreBtn').classList.remove('hidden')
      : document.getElementById('loadMoreBtn').classList.add('hidden');
  }
  
  function playCardHTML(item) {
    const cat = item.category || '기타';
    const col = CAT_COLORS[cat] || CAT_COLORS['기타'];
    const emoji = item.emoji || CAT_EMOJI[cat] || '🎪';
    return `<a href="play.html?id=${item.id}" class="play-card" onclick="openDetail(event,'${item.id}')">
      <div class="play-thumb" style="background:${col.bg}">${emoji}</div>
      <div class="play-body">
        <div class="play-cat" style="color:${col.color}">${cat}</div>
        <div class="play-title">${item.title}</div>
        <div class="play-summary">${item.summary || ''}</div>
        ${item.age ? `<span class="play-age-badge">👶 ${item.age}</span>` : ''}
      </div>
    </a>`;
  }
  
  function loadMore() { displayCount += 12; renderGrid(currentCat); }
  
  // ── 상세 화면 ────────────────────────────────
  function openDetail(e, id) {
    e.preventDefault();
    history.pushState({id}, '', `play.html?id=${id}`);
    showDetail(id);
    window.scrollTo({top:0, behavior:'smooth'});
  }
  
  function showDetail(id) {
    const item = allItems.find(t => String(t.id) === String(id));
    currentItem = item;
    document.getElementById('listView').classList.add('hidden');
    document.getElementById('detailView').classList.remove('hidden');
  
    if (!item) {
      document.getElementById('detailContent').innerHTML = '<div class="empty-state">액티비티를 찾을 수 없어요.</div>';
      document.getElementById('actionBar').classList.add('hidden');
      return;
    }
  
    const cat = item.category || '기타';
    const col = CAT_COLORS[cat] || CAT_COLORS['기타'];
    const emoji = item.emoji || CAT_EMOJI[cat] || '🎪';
    const related = allItems.filter(t => t.category === cat && t.id !== item.id).slice(0, 3);
  
    document.title = `${item.title} | 아기도구함 액티비티`;
  
    document.getElementById('detailContent').innerHTML = `
      <div class="detail-thumb-big" style="background:${col.bg}">${emoji}</div>
      <span class="detail-cat-badge" style="background:${col.bg};color:${col.color}">${CAT_EMOJI[cat]||'🎪'} ${cat}</span>
      <h1 class="detail-title">${item.title}</h1>
      <div class="detail-meta">
        ${item.age ? `<span class="meta-chip">👶 ${item.age}</span>` : ''}
        ${item.location ? `<span class="meta-chip">📍 ${item.location}</span>` : ''}
        ${item.price ? `<span class="meta-chip">💰 ${item.price}</span>` : ''}
      </div>
      <div class="detail-content">${item.content || `<p>${item.summary || '상세 내용이 없어요.'}</p>`}</div>
      ${item.tags ? `<div style="display:flex;flex-wrap:wrap;gap:7px;margin-top:1.5rem;padding-top:1.25rem;border-top:1px solid var(--gray-100);">
        ${item.tags.split(',').map(t=>`<span style="padding:4px 12px;border-radius:99px;background:var(--gray-50);border:1px solid var(--gray-100);font-size:12px;color:var(--text-muted);">#${t.trim()}</span>`).join('')}
      </div>` : ''}
      ${related.length ? `<div class="related-section">
        <h3>비슷한 액티비티</h3>
        <div class="related-grid">${related.map(playCardHTML).join('')}</div>
      </div>` : ''}
    `;
  
    // 액션 바 설정
    const actionBar = document.getElementById('actionBar');
    actionBar.classList.remove('hidden');
    updateHeartBtn(item.id);
  
    const bookBtn = document.getElementById('bookBtn');
    if (item.link) {
      bookBtn.href = item.link;
      bookBtn.classList.remove('disabled');
      bookBtn.onclick = null;
    } else {
      bookBtn.href = '#';
      bookBtn.classList.add('disabled');
      bookBtn.onclick = (e) => { e.preventDefault(); alert('예약 링크가 아직 없어요.'); };
    }
  }
  
  // ── 하트(찜) 기능 ─────────────────────────────
  function updateHeartBtn(id) {
    const btn = document.getElementById('heartBtn');
    const liked = likedIds.includes(String(id));
    btn.textContent = liked ? '❤️' : '🤍';
    btn.classList.toggle('liked', liked);
  }
  
  function toggleHeart() {
    if (!currentItem) return;
    const id = String(currentItem.id);
    const idx = likedIds.indexOf(id);
    if (idx === -1) likedIds.push(id);
    else likedIds.splice(idx, 1);
    localStorage.setItem('playLikes', JSON.stringify(likedIds));
    updateHeartBtn(id);
  }
  
  // ── 뒤로가기 처리 ─────────────────────────────
  window.addEventListener('popstate', () => {
    const id = new URLSearchParams(location.search).get('id');
    if (id) showDetail(id);
    else showList();
  });
  
  init();
  </script>
  </body>
  </html>
